name: Deploy Back Ventas to EC2

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker de back-ventas
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest

      - name: Desplegar back-ventas en EC2 Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app/back-ventas
            cd ~/app/back-ventas

            cat > docker-compose.yml << 'EOF'
            services:
              back-ventas:
                image: juanjoelproxdlol/back-ventas:latest
                container_name: back-ventas-app
                ports:
                  - "8081:8080"
                environment:
                  DB_ENDPOINT: mysql-ventas
                  DB_PORT: 3306
                  DB_NAME: ventasdb
                  DB_USERNAME: ventasuser
                  DB_PASSWORD: ventaspass
                depends_on:
                  - mysql-ventas
                restart: always

              mysql-ventas:
                image: mysql:8
                container_name: mysql-ventas
                environment:
                  MYSQL_DATABASE: ventasdb
                  MYSQL_USER: ventasuser
                  MYSQL_PASSWORD: ventaspass
                  MYSQL_ROOT_PASSWORD: rootpass
                volumes:
                  - ventas_data:/var/lib/mysql
                restart: always

            volumes:
              ventas_data:
            EOF

            sudo docker pull juanjoelproxdlol/back-ventas:latest
            sudo docker compose down || true
            sudo docker compose up -d
            sudo docker image prune -f