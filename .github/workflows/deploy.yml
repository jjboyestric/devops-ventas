name: Build and Push Back Ventas Image

on:
  push:
    branches:
      - deploy

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Back Ventas Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest .

      - name: Push Back Ventas Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest